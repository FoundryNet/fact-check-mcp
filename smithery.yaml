name: "@foundrynet/fact-check-mcp"
displayName: "FoundryNet Fact Verification"
description: >-
  Claim verification using cross-network source checking with confidence scoring. Queries sibling FoundryNet servers as authoritative sources.
icon: "✅"
homepage: "https://foundrynet.io"
repository: "https://github.com/FoundryNet/fact-check-mcp"
license: "MIT"
categories:
  - research
  - data
  - verification
tags:
  - fact-checking
  - claim-verification
  - source-verification
  - truth-checking
  - content-verification
keywords:
  - fact-checking
  - claim-verification
  - source-verification
  - truth-checking
  - content-verification
attestation:
  protocol: "MINT Protocol"
  verified_outputs: true
  live_feed: "https://mint.foundrynet.io/feed"
network:
  name: "FoundryNet Data Network"
  servers: 17
startCommand:
  type: http
  url: "https://fact-check-mcp-production.up.railway.app/mcp"
  transport: streamable-http
  configSchema:
    type: object
    properties:
      api_key:
        type: string
        title: "Forge billing key (optional)"
        description: "fnet_ key to bypass the per-query x402 paywall and bill to a Forge account."
